<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="p-4">
    <div class="d-flex justify-content-between align-items-center mb-4">
        <h3>User Management & History</h3>
        <a href="/" class="btn btn-secondary btn-sm">Back to Explorer</a>
    </div>

    <table class="table table-striped table-sm border">
        <thead class="table-dark">
            <tr>
                <th>ID</th><th>User</th><th>Login Time</th><th>IP Address</th>
            </tr>
        </thead>
        <tbody>
            {% for log in logs %}
            <tr>
                <td>{{log[0]}}</td><td>{{log[1]}}</td><td>{{log[2]}}</td><td>{{log[3]}}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
