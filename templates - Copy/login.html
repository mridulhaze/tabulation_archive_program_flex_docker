<!DOCTYPE html>
<html>
<head>
    <title>NU Archive Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background-color: #F4F6F7; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .login-card { width: 400px; border: 2px solid #FFD700; background: white; border-radius: 8px; overflow: hidden; }
        .header { background: #3498DB; color: white; padding: 20px; text-align: center; font-weight: bold; }
        .btn-primary { background: #3498DB; border: none; }
        .btn-primary:hover { background: #2E4053; }
    </style>
</head>
<body>
    <div class="login-card shadow">
        <div class="header">National University Archive</div>
        <div class="p-4">
            {% with messages = get_flashed_messages(with_categories=true) %}
                {% if messages %}{% for c, m in messages %}<div class="alert alert-{{c}} small">{{m}}</div>{% endfor %}{% endif %}
            {% endwith %}
            <form method="POST">
                <label class="small fw-bold">Username</label>
                <input type="text" name="username" class="form-control mb-3" required>
                <label class="small fw-bold">Password</label>
                <input type="password" name="password" class="form-control mb-4" required>
                <button type="submit" class="btn btn-primary w-100">LOGIN</button>
            </form>
        </div>
    </div>
</body>
</html>
